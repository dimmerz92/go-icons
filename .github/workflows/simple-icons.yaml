name: sync-simple-icons

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  simple-icons-check:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.check.outputs.new }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release tag
        id: release
        run: |
          TAG=$(curl -s https://api.github.com/repos/simple-icons/simple-icons/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if new release
        id: check
        run: |
          CURRENT=$(jq -r ".simpleIcons" versions.json)
          LATEST=${{ steps.release.outputs.tag }}
          CLEAN=$(echo $LATEST | sed `s/[^0-9.]//g`)
          if [[ "$CURRENT" != "$CLEAN" ]]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi

  simple-icons-sync:
    runs-on: ubuntu-latest
    needs: simple-icons-check
    if: ${{ needs.simple-icons-check.outputs.new == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Sparse clone simple-icons
        run: |
          git clone --depth 1 --branch ${{ needs.simple-icons-check.outputs.tag }} https://github.com/simple-icons/simple-icons simple-icons-repo
          cd simple-icons-repo
          git sparse-checkout init --cone
          git sparse-checkout set icons

      - name: Process new simple-icons
        id: sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          go install github.com/a-h/templ/cmd/templ@latest
          go run ./cmd/sync/main.go simple-icons
          rm -rf ./simple-icons-repo
          templ fmt ./simple-icons
          templ generate
          CLEAN_TAG=$(echo "${{ needs.simple-icons-check.outputs.tag }}" | sed 's/[^0-9.]//g')
          jq --arg v "$CLEAN_TAG" '.simpleIcons = $v' versions.json > tmp.json && mv tmp.json versions.json
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: sync with simple-icons repo"
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit PR for new simple-icons
        if: ${{ steps.sync.outputs.changes == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[ci] simple-icons sync"
          labels: ci,sync
          branch: sync
          assignees: dimmerz92
