name: sync-ionic-icons

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  ionic-check:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.new-commits.outputs.new }}
    steps:
      - name: Check if any new svg icons added to ionic icons repo
        id: new-commits
        shell: bash
        run: |
          SINCE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          COMMITS=$(curl -s "https://api.github.com/repos/ionic-team/ionicons/commits?since=$SINCE&path=src/svg")
          FOUND=false
          for SHA in $(echo "$COMMITS" | jq -r '.[].sha'); do
            FILES=$(curl -s "https://api.github.com/repos/ionic-team/ionicons/commits/$SHA")
            MATCH=$(echo "$FILES" | jq '[.files[] | select(
              (.filename | endswith(".svg")) and (.status == "added" or .status == "modified")
            )] | length')
            if [ "$MATCH" -gt 0 ]; then
              FOUND=true
            fi
          done
          echo "new=$FOUND" >> $GITHUB_OUTPUT

  ionic-sync:
    runs-on: ubuntu-latest
    needs: ionic-check
    if: ${{ needs.ionic-check.outputs.new == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Sparse clone ionic icons
        run: |
          git clone --depth 1 --no-checkout https://github.com/ionic-team/ionicons ionicons-repo
          cd ionicons-repo
          git sparse-checkout init --cone
          git sparse-checkout set src/svg
          git checkout main

      - name: Process new ionic icons
        id: sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          go install github.com/a-h/templ/cmd/templ@latest
          go run ./cmd/sync/main.go ionicons
          rm -rf ./ionicons-repo
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: sync with ionic icons repo"
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit PR for new ionic icons
        if: ${{ steps.sync.outputs.changes == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[ci] ionic icons sync"
          labels: ci,sync
          branch: sync
          assignees: dimmerz92
