name: sync-material

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  material-check:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.new-commits.outputs.new }}
    steps:
      - name: Check if any new svg icons added to material icons repo
        id: new-commits
        shell: bash
        run: |
          SINCE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%SZ")
          COMMITS=$(curl -s "https://api.github.com/repos/mui/material-ui/commits?since=$SINCE&path=packages/mui-icons-material/material-icons")
          FOUND=false
          for SHA in $(echo "$COMMITS" | jq -r '.[].sha'); do
            FILES=$(curl -s "https://api.github.com/repos/mui/material-ui/commits/$SHA")
            MATCH=$(echo "$FILES" | jq '[.files[] | select(
              (.filename | endswith(".svg")) and (.status == "added" or .status == "modified")
            )] | length')
            if [ "$MATCH" -gt 0 ]; then
              FOUND=true
            fi
          done
          echo "new=$FOUND" >> $GITHUB_OUTPUT

  material-sync:
    runs-on: ubuntu-latest
    needs: material-check
    if: ${{ needs.material-check.outputs.new == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Sparse clone material icons
        run: |
          git clone --depth 1 --no-checkout https://github.com/mui/material-ui material-repo
          cd material-repo
          git sparse-checkout init --cone
          git sparse-checkout set packages/mui-icons-material/material-icons
          git checkout master

      - name: Process new material icons
        id: sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          go install github.com/a-h/templ/cmd/templ@latest
          go run ./cmd/sync/main.go material
          rm -rf ./material-repo
          templ fmt material
          templ generate
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: sync with material icons repo"
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit PR for new material icons
        if: ${{ steps.sync.outputs.changes == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[ci] material icons sync"
          labels: ci,sync
          branch: sync
          assignees: dimmerz92
