name: sync-material

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  material-check:
    runs-on: ubuntu-latest
    outputs:
      new: ${{ steps.check.outputs.new }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get latest release tag
        id: release
        run: |
          TAG=$(curl -s https://api.github.com/repos/mui/material-ui/releases/latest | jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if new release
        id: check
        run: |
          CURRENT=$(jq -r ".material" versions.json)
          LATEST=${{ steps.release.outputs.tag }}
          CLEAN=$(echo $LATEST | sed 's/[^0-9.]//g')
          if [[ "$CURRENT" != "$CLEAN" ]]; then
            echo "new=true" >> $GITHUB_OUTPUT
          else
            echo "new=false" >> $GITHUB_OUTPUT
          fi

  material-sync:
    runs-on: ubuntu-latest
    needs: material-check
    if: ${{ needs.material-check.outputs.new == 'true' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod

      - name: Sparse clone material icons
        run: |
          git clone --depth 1 --branch ${{ needs.material-check.outputs.tag }} https://github.com/mui/material-ui material-repo
          cd material-repo
          git sparse-checkout init --cone
          git sparse-checkout set packages/mui-icons-material/material-icons

      - name: Process new material icons
        id: sync
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          go install github.com/a-h/templ/cmd/templ@latest
          go run ./cmd/sync/main.go material
          rm -rf ./material-repo
          templ fmt material
          templ generate
          CLEAN_TAG=$(echo "${{ needs.material-check.outputs.tag }}" | sed 's/[^0-9.]//g')
          jq --arg v "$CLEAN_TAG" '.material = $v' versions.json > tmp.json && mv tmp.json versions.json
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "ci: sync with material icons repo"
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Submit PR for new material icons
        if: ${{ steps.sync.outputs.changes == 'true' }}
        uses: peter-evans/create-pull-request@v8
        with:
          title: "[ci] material icons sync"
          labels: ci,sync
          branch: sync
          assignees: dimmerz92
